{% assign publications = include.publications %}
<section class="site-section">
    <div class="section-heading">
        <h2>{% if include.title %}{{ include.title }}{% else %}<i class="fas fa-star"></i> Selected Publications{% endif %}</h2>
        <div class="section-heading__actions">
            <a href="publications">View all <i class="fas fa-angle-right"></i></a>
            <a href="https://scholar.google.com/citations?user=4_KIgHkAAAAJ" target="_blank" rel="noopener">
                <img src="https://img.shields.io/endpoint?url=https://changranxu.github.io/assets/results/gs_data_shieldsio.json&logo=Google%20Scholar&labelColor=f6f6f6&color=9cf&style=flat&label=citations" alt="Google Scholar citation count">
            </a>
        </div>
    </div>

    <div class="publication-list">
        {% for item in publications limit:include.limit %}
            {% include widgets/publication_item.html item=item %}
        {% endfor %}
    </div>
</section>
